<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STREAMX - Ultra Player</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Video Engines -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.6/shaka-player.compiled.js"></script>

    <style>
        /* --- CSS VARIABLES --- */
        :root {
            --bg: #050505; --nav-bg: #000000; --card-bg: #0d0d0f;
            --text: #ffffff; --text-dim: #b3b3b3; --accent: #E50914;
            --border: #1a1a1a; --shadow: rgba(229, 9, 20, 0.5);
        }
        [data-theme="light"] {
            --bg: #f8f9fa; --nav-bg: #ffffff; --card-bg: #ffffff;
            --text: #1a1a1f; --text-dim: #6c757d; --accent: #E50914;
            --border: #e9ecef; --shadow: rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; transition: 0.3s; }
        *::-webkit-scrollbar { display: none; }

        /* --- NAVBAR --- */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 6%; background: var(--nav-bg);
            position: fixed; width: 100%; top: 0; z-index: 1000;
            border-bottom: 1px solid var(--border);
        }
        .logo { font-size: 26px; font-weight: 900; letter-spacing: -1px; cursor: pointer; color: var(--text); text-decoration: none; }
        .logo span.red { color: var(--accent); }
        
        .search-box {
            background: var(--bg); border: 1px solid var(--border);
            padding: 8px 15px; border-radius: 10px; display: flex; align-items: center;
            transition: 0.3s; width: 200px;
        }
        .search-box:focus-within { width: 280px; border-color: var(--accent); }
        .search-box input { background: transparent; border: none; color: var(--text); outline: none; width: 100%; margin-left: 10px; }

        /* --- SIDEBAR --- */
        .sidebar {
            position: fixed; top: 0; left: -320px; width: 300px; height: 100%;
            background: var(--nav-bg) !important; z-index: 2000; border-right: 1px solid var(--border);
            padding: 40px 30px; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar.open { left: 0; }
        .sidebar-close { position: absolute; top: 25px; right: 25px; font-size: 28px; cursor: pointer; }

        /* --- HERO BANNER --- */
        .slider-container { width: 100%; height: 70vh; margin-top: 60px; position: relative; overflow: hidden; background: #000; }
        .slide { min-width: 100%; height: 100%; position: relative; display: none; }
        .slide.active { display: block; animation: zoomIn 10s infinite alternate; }
        @keyframes zoomIn { from { transform: scale(1); } to { transform: scale(1.05); } }
        .slide img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .slide-content { position: absolute; bottom: 10%; left: 6%; z-index: 10; max-width: 500px; }
        .slide-content h1 { font-size: clamp(30px, 5vw, 50px); font-weight: 900; margin-bottom: 15px; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        .btn-play { background: var(--accent); color: #fff; padding: 12px 35px; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 16px; }

        /* --- CATEGORIES & GRID --- */
        .filter-container { padding: 30px 6% 0; display: flex; gap: 12px; overflow-x: auto; }
        .filter-chip { padding: 10px 25px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 50px; cursor: pointer; font-weight: 600; white-space: nowrap; transition: 0.3s; }
        .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

        .container { padding: 30px 6% 100px; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 25px; }
        .movie-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); transition: 0.4s; cursor: pointer; position: relative; }
        .movie-card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 10px 30px var(--shadow); }
        .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .card-info { padding: 15px; }
        .card-info h4 { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- TRANSPARENT PLAYER --- */
        .player-modal { position: fixed; inset: 0; background: #000; display: none; z-index: 3000; overflow: hidden; }
        #v-player { width: 100%; height: 100%; outline: none; }
        .player-top-bar { position: absolute; top: 0; width: 100%; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; z-index: 3100; background: transparent; pointer-events: none; }
        .player-logo-text { font-size: 22px; font-weight: 900; color: #fff; text-shadow: 2px 2px 8px rgba(0,0,0,0.8); pointer-events: auto; }
        .player-exit { font-size: 35px; color: #fff; cursor: pointer; text-shadow: 2px 2px 8px rgba(0,0,0,0.8); pointer-events: auto; }
        
        .player-settings { position: absolute; bottom: 80px; right: 30px; z-index: 3100; display: flex; flex-direction: column; align-items: flex-end; }
        .settings-btn { width: 45px; height: 45px; background: rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color:#fff; border: 1px solid rgba(255,255,255,0.2); }
        .settings-panel { background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(10px); border: 1px solid #333; padding: 15px; border-radius: 12px; width: 200px; margin-bottom: 10px; display: none; }
        .settings-panel.open { display: block; }
        select { width: 100%; background: #222; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 6px; margin-top: 5px; margin-bottom: 10px; outline: none; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <i class="fa-solid fa-bars-staggered" style="cursor:pointer; font-size:20px" onclick="toggleSidebar()"></i>
            <a href="#" class="logo"><span class="red">STREAM</span><span>X</span></a>
        </div>
        <div class="nav-right" style="display:flex; gap:15px; align-items:center;">
            <div class="search-box">
                <i class="fa fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search..." oninput="doSearch()">
            </div>
            <button class="theme-btn" onclick="toggleTheme()" id="themeBtn"><i class="fa-solid fa-moon"></i></button>
        </div>
    </nav>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <i class="fa fa-times sidebar-close" onclick="toggleSidebar()"></i>
        <div class="logo" style="margin-bottom:40px"><span class="red">STREAM</span><span>X</span></div>
        <div style="line-height:1.8">
            <p style="font-weight:900; font-size:18px; margin-bottom:15px; text-transform:uppercase;">About Info</p>
            <p style="color:var(--text-dim); font-size:14px">Direct streaming engine supporting PHP, M3U8, and DASH. Developed by <b>Yash</b>.</p>
        </div>
    </div>

    <!-- BANNER -->
    <section class="slider-container" id="sliderArea"></section>

    <div class="filter-container" id="filterArea">
        <div class="filter-chip active" onclick="filterData('All', this)">All Content</div>
    </div>

    <div class="container" id="mainContainer">
        <div class="movie-grid" id="movieGrid"></div>
    </div>

    <!-- PLAYER -->
    <div class="player-modal" id="playerModal">
        <div class="player-top-bar">
            <div class="player-logo-text">STREAM<span style="color:var(--accent)">X</span></div>
            <div class="player-exit" onclick="closePlayer()">&times;</div>
        </div>
        <div class="player-settings">
            <div class="settings-panel" id="settingsPanel">
                <label style="font-size:10px; color:#aaa;">AUDIO</label><select id="audioSel" onchange="changeAudio()"></select>
                <label style="font-size:10px; color:#aaa;">QUALITY</label><select id="qualitySel" onchange="changeQuality()"></select>
            </div>
            <div class="settings-btn" onclick="toggleSettings()"><i class="fa fa-cog"></i></div>
        </div>
        <video id="v-player" crossorigin="anonymous" playsinline controls></video>
    </div>

    <script>
        let allData = [], hls = null, shakaPlayer = null;
        const JSON_URL = "https://api.npoint.io/56fc751c2191cd12b672";
        const PROXY = "https://corsproxy.io/?"; // Fixed CORS for PHP links

        async function init() {
            shaka.polyfill.installAll();
            const res = await fetch(JSON_URL);
            allData = await res.json();
            renderUI(allData);
        }

        function renderUI(data) {
            const banner = data.filter(m => !m.cat)[0];
            const gridItems = data.filter(m => m.cat);
            
            // Render Banner
            document.getElementById('sliderArea').innerHTML = `
                <div class="slide active">
                    <img src="${banner.logo}">
                    <div class="slide-content">
                        <h1>${banner.name}</h1>
                        <button class="btn-play" onclick="openPlayer('${banner.url}')"><i class="fa fa-play"></i> WATCH NOW</button>
                    </div>
                </div>`;

            // Render Grid
            renderGrid(gridItems);

            // Render Filters
            const cats = [...new Set(gridItems.map(m => m.cat))];
            cats.forEach(c => document.getElementById('filterArea').innerHTML += `<div class="filter-chip" onclick="filterData('${c}', this)">${c}</div>`);
        }

        function renderGrid(items) {
            document.getElementById('movieGrid').innerHTML = items.map(m => `
                <div class="movie-card" onclick="openPlayer('${m.url}')">
                    <img src="${m.logo}" loading="lazy">
                    <div class="card-info"><h4>${m.name}</h4></div>
                </div>`).join('');
        }

        async function openPlayer(url) {
            const modal = document.getElementById('playerModal');
            const video = document.getElementById('v-player');
            modal.style.display = 'block';

            // Reset UI
            document.getElementById('qualitySel').innerHTML = '<option>Auto</option>';
            document.getElementById('audioSel').innerHTML = '<option>Default</option>';

            const cleanUrl = url.split('|')[0].trim();
            const proxiedUrl = PROXY + encodeURIComponent(cleanUrl); // Bypass CORS for PHP/TS
            const isMPD = cleanUrl.includes('.mpd');

            if (isMPD) {
                if (!shakaPlayer) shakaPlayer = new shaka.Player(video);
                await shakaPlayer.load(proxiedUrl);
            } else if (Hls.isSupported()) {
                if (hls) hls.destroy();
                hls = new Hls({ xhrSetup: (xhr, u) => { if(u.indexOf(PROXY) === -1) xhr.open('GET', PROXY + encodeURIComponent(u), true); } });
                hls.loadSource(proxiedUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    document.getElementById('qualitySel').innerHTML = hls.levels.map((l,i) => `<option value="${i}">${l.height}p</option>`).join('');
                    video.play();
                });
            } else { video.src = proxiedUrl; video.play(); }
        }

        function closePlayer() {
            const v = document.getElementById('v-player');
            v.pause(); v.src = "";
            if (hls) hls.destroy();
            document.getElementById('playerModal').style.display = 'none';
        }

        function filterData(cat, el) {
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            const filtered = cat === 'All' ? allData.filter(m => m.cat) : allData.filter(m => m.cat === cat);
            renderGrid(filtered);
            window.scrollTo({ top: document.getElementById('mainContainer').offsetTop - 80, behavior: 'smooth' });
        }

        function doSearch() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            renderGrid(allData.filter(m => m.name.toLowerCase().includes(q)));
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('open'); }
        function toggleTheme() { document.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }

        init();
    </script>
</body>
</html>

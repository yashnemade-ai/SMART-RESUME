<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STREAMX - Premium Engine</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    
    <!-- ExoPlayer Web Equivalent: Shaka Player -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.debug.js"></script>

    <style>
        /* --- UI PRESERVED: HIDE SCROLLBARS --- */
        *::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }

        :root {
            --bg: #050505; --nav-bg: #000000; --card-bg: #0d0d0f;
            --text: #ffffff; --text-dim: #b3b3b3; --accent: #E50914;
            --border: #1a1a1a; --shadow: rgba(229, 9, 20, 0.5);
        }

        [data-theme="light"] {
            --bg: #f8f9fa; --nav-bg: #ffffff; --card-bg: #ffffff;
            --text: #1a1a1f; --text-dim: #6c757d; --accent: #E50914;
            --border: #e9ecef; --shadow: rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; transition: background 0.4s; }

        /* --- NAVBAR --- */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 12px 6%; background: var(--nav-bg); position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 2px solid var(--border); }
        .logo { font-size: 28px; font-weight: 900; letter-spacing: -1px; cursor: pointer; color: var(--text); text-decoration: none; }
        .logo span.red { color: var(--accent); }
        .search-box { background: var(--bg); border: 2px solid var(--border); padding: 8px 15px; border-radius: 10px; display: flex; align-items: center; transition: 0.3s; width: 200px; }
        .search-box:focus-within { width: 280px; border-color: var(--accent); }
        .search-box input { background: transparent; border: none; color: var(--text); outline: none; width: 100%; margin-left: 10px; font-size: 14px; }
        .theme-btn { font-size: 22px; cursor: pointer; color: var(--text); background: none; border: none; }

        /* --- SIDEBAR --- */
        .sidebar { position: fixed; top: 0; left: -320px; width: 300px; height: 100%; background: var(--nav-bg) !important; z-index: 2000; border-right: 2px solid var(--border); padding: 40px 30px; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); color: var(--text); }
        .sidebar.open { left: 0; }
        .sidebar-close { position: absolute; top: 25px; right: 25px; font-size: 28px; cursor: pointer; }

        /* --- BANNER --- */
        .slider-container { width: 100%; height: 75vh; margin-top: 65px; position: relative; overflow: hidden; background: #000; touch-action: pan-y; }
        .slider-wrapper { display: flex; height: 100%; transition: transform 0.8s cubic-bezier(0.45, 0, 0.55, 1); }
        .slide { min-width: 100%; height: 100%; position: relative; overflow: hidden; }
        .slide img { width: 100%; height: 100%; object-fit: 100% 100%; transition: 10s ease-in-out; }
        .slide.active img { transform: scale(1.03); } 
        .slide-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8) 10%, transparent 50%); }
        .slide-content { position: absolute; bottom: 12%; left: 6%; z-index: 10; max-width: 500px; }
        .badge { background: var(--accent); color: white; padding: 4px 12px; border-radius: 4px; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 15px; display: inline-block; }
        .slide-content h1 { font-size: clamp(28px, 5vw, 45px); font-weight: 900; color: #fff; margin-bottom: 10px; text-shadow: 2px 2px 15px rgba(0,0,0,0.5); }
        .btn-watch-main { background: var(--accent); color: #fff; padding: 12px 35px; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 16px; display: flex; align-items: center; gap: 10px; text-transform: uppercase; }
        .slider-dots { position: absolute; bottom: 25px; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 20; }
        .dot { width: 10px; height: 10px; background: rgba(255,255,255,0.3); border-radius: 50%; cursor: pointer; transition: 0.4s; }
        .dot.active { background: var(--accent); width: 25px; border-radius: 10px; }

        /* --- CARDS --- */
        .filter-container { padding: 35px 6% 0; display: flex; gap: 12px; overflow-x: auto; scrollbar-width: none; }
        .filter-chip { padding: 10px 28px; background: var(--card-bg); border: 2px solid var(--border); border-radius: 8px; cursor: pointer; font-weight: 700; white-space: nowrap; transition: 0.3s; color: var(--text); }
        .filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .container { padding: 30px 6% 100px; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 25px; }
        .movie-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 2px solid var(--border); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; position: relative; }
        .movie-card:hover { transform: translateY(-12px); border-color: var(--accent); box-shadow: 0 15px 30px var(--shadow); }
        .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .card-info { padding: 15px; }
        .card-genre { font-size: 11px; color: var(--accent); font-weight: 800; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .card-info h4 { font-size: 14px; font-weight: 800; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- PLAYER (EXOPLAYER STYLE - TRANSPARENT TOP) --- */
        .player-modal { position: fixed; inset: 0; background: #000; display: none; z-index: 3000; overflow: hidden; }
        #v-player { width: 100%; height: 100%; outline: none; border: none; }
        .player-top-bar { position: absolute; top: 0; width: 100%; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; z-index: 3100; background: transparent; pointer-events: none; }
        .player-logo-text { font-size: 24px; font-weight: 900; color: #fff; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); pointer-events: auto; }
        .player-exit { font-size: 35px; color: #fff; cursor: pointer; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); pointer-events: auto; }
        .player-settings-group { position: absolute; bottom: 80px; right: 30px; z-index: 3100; display: flex; flex-direction: column; align-items: flex-end; }
        .settings-btn { width: 45px; height: 45px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color:#fff; border: 1px solid rgba(255,255,255,0.2); }
        .settings-panel { background: rgba(17,17,17,0.9); backdrop-filter: blur(10px); border: 1px solid #333; padding: 15px; border-radius: 10px; width: 200px; margin-bottom: 10px; display: none; }
        .settings-panel.open { display: block; }
        .setting-row select { width: 100%; background: #222; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 5px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <i class="fa-solid fa-bars-staggered" style="cursor:pointer; font-size:22px" onclick="toggleSidebar()"></i>
            <a href="#" class="logo" onclick="location.reload()"><span class="red">STREAM</span><span>X</span></a>
        </div>
        <div class="nav-right" style="display:flex; gap:15px; align-items:center;">
            <div class="search-box">
                <i class="fa fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search..." oninput="doSearch()">
            </div>
            <button class="theme-btn" onclick="toggleTheme()" id="themeBtn"><i class="fa-solid fa-moon"></i></button>
        </div>
    </nav>

    <div class="sidebar" id="sidebar">
        <i class="fa fa-times sidebar-close" onclick="toggleSidebar()"></i>
        <div class="logo" style="margin-bottom:40px"><span class="red">STREAM</span><span>X</span></div>
        <div style="line-height:1.8">
            <p style="color:var(--text); font-weight:900; font-size:18px; margin-bottom:15px; text-transform:uppercase;">About Info</p>
            <p style="color:var(--text-dim); font-size:15px">High-performance engine supporting M3U8, DASH, PHP and TS links without extensions.</p>
        </div>
    </div>

    <section class="slider-container" id="sliderArea"></section>

    <div class="filter-container" id="filterArea">
        <div class="filter-chip active" onclick="filterData('All', this)">All Content</div>
    </div>

    <div class="container" id="mainContainer">
        <div class="movie-grid" id="movieGrid" data-aos="fade-up"></div>
    </div>

    <!-- PLAYER -->
    <div class="player-modal" id="playerModal">
        <div class="player-top-bar">
            <div class="player-logo-text">STREAM<span style="color:var(--accent)">X</span></div>
            <div class="player-exit" onclick="closePlayer()">&times;</div>
        </div>
        <div class="player-settings-group">
            <div class="settings-panel" id="settingsPanel">
                <div class="setting-row"><label style="font-size:10px; color:#aaa;">AUDIO</label><select id="audioSel" onchange="changeAudio()"></select></div>
                <div class="setting-row"><label style="font-size:10px; color:#aaa;">QUALITY</label><select id="qualitySel" onchange="changeQuality()"></select></div>
            </div>
            <div class="settings-btn" onclick="toggleSettings()"><i class="fa fa-cog"></i></div>
        </div>
        <video id="v-player" crossorigin="anonymous" playsinline controls></video>
    </div>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800 });
        let allData = [], heroItems = [], gridItems = [], currentIndex = 0;
        let shakaPlayer = null, slideInterval;
        const JSON_URL = "https://api.npoint.io/6e064f3d3f22881accc7";
        const PROXY = "https://corsproxy.io/?";

        async function init() {
            shaka.polyfill.installAll();
            const res = await fetch(JSON_URL);
            allData = await res.json();
            heroItems = allData.filter(m => !m.cat);
            gridItems = allData.filter(m => m.cat);
            renderUI();
            initSwipe();
        }

        function renderUI() {
            const wrapper = document.getElementById('sliderArea');
            wrapper.innerHTML = heroItems.map((m, i) => `
                <div class="slide ${i === 0 ? 'active' : ''}">
                    <img src="${m.logo}">
                    <div class="slide-overlay"></div>
                    <div class="slide-content">
                        <span class="badge">Trending Now</span>
                        <h1>${m.name}</h1>
                        <button class="btn-watch-main" onclick="openPlayer('${m.url}')">WATCH NOW</button>
                    </div>
                </div>`).join('');
            
            renderGrid(gridItems);
            
            const fArea = document.getElementById('filterArea');
            [...new Set(gridItems.map(m => m.cat))].forEach(c => {
                fArea.innerHTML += `<div class="filter-chip" onclick="filterData('${c}', this)">${c}</div>`;
            });
            startAutoSlide();
        }

        function renderGrid(items) {
            document.getElementById('movieGrid').innerHTML = items.map(m => `
                <div class="movie-card" onclick="openPlayer('${m.url}')">
                    <img src="${m.logo}" loading="lazy">
                    <div class="card-info">
                        <span class="card-genre">${m.cat}</span>
                        <h4>${m.name}</h4>
                    </div>
                </div>`).join('');
        }

        // --- EXOPLAYER LEVEL LOGIC ---
        async function openPlayer(url) {
            const modal = document.getElementById('playerModal');
            const video = document.getElementById('v-player');
            modal.style.display = 'block';

            // Clean URL and apply Proxy for CORS-free playback
            const cleanUrl = url.split('|')[0].trim();
            const proxiedUrl = PROXY + encodeURIComponent(cleanUrl);

            if (shakaPlayer) await shakaPlayer.unload();
            else shakaPlayer = new shaka.Player(video);

            // Configure for high performance (ExoPlayer style)
            shakaPlayer.configure({
                streaming: {
                    bufferingGoal: 60, // 60 seconds of buffer
                    rebufferingGoal: 15,
                    bufferBehind: 30
                }
            });

            // Proxy all sub-segments automatically
            shakaPlayer.getNetworkingEngine().registerRequestFilter((type, request) => {
                if (request.uris[0].indexOf(PROXY) === -1) {
                    request.uris[0] = PROXY + encodeURIComponent(request.uris[0]);
                }
            });

            try {
                await shakaPlayer.load(proxiedUrl);
                setupTracks();
                video.play();
            } catch (e) {
                console.warn("Shaka Load failed, falling back to direct", e);
                video.src = proxiedUrl;
            }
        }

        function setupTracks() {
            const qSel = document.getElementById('qualitySel');
            const aSel = document.getElementById('audioSel');
            const variants = shakaPlayer.getVariantTracks();
            const languages = shakaPlayer.getAudioLanguagesAndRoles();

            qSel.innerHTML = variants.map(t => `<option value="${t.id}">${t.height}p</option>`).join('');
            aSel.innerHTML = languages.map(t => `<option value="${t.language}">${t.language}</option>`).join('') || '<option>Default</option>';
        }

        function changeQuality() {
            const id = document.getElementById('qualitySel').value;
            const track = shakaPlayer.getVariantTracks().find(t => t.id == id);
            shakaPlayer.selectVariantTrack(track, true);
        }

        function changeAudio() {
            shakaPlayer.selectAudioLanguage(document.getElementById('audioSel').value);
        }

        function closePlayer() {
            const v = document.getElementById('v-player');
            v.pause();
            shakaPlayer.unload();
            document.getElementById('playerModal').style.display = 'none';
        }

        // UI HELPERS (STRICT DESIGN)
        function startAutoSlide() { slideInterval = setInterval(() => goToSlide((currentIndex + 1) % heroItems.length), 7000); }
        function manualSlide(i) { clearInterval(slideInterval); goToSlide(i); startAutoSlide(); }
        function goToSlide(i) { currentIndex = i; const w = document.getElementById('sliderWrapper'); if(w) w.style.transform = `translateX(-${i * 100}%)`; document.querySelectorAll('.slide').forEach((s, idx) => s.classList.toggle('active', idx === i)); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('open'); }
        function toggleTheme() { document.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }
        function doSearch() { const q = document.getElementById('searchInput').value.toLowerCase(); renderGrid(gridItems.filter(m => m.name.toLowerCase().includes(q))); }
        function filterData(cat, el) { document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active')); el.classList.add('active'); renderGrid(cat === 'All' ? gridItems : gridItems.filter(m => m.cat === cat)); window.scrollTo({ top: document.getElementById('mainContainer').offsetTop - 80, behavior: 'smooth' }); }
        function initSwipe() { const s = document.getElementById('sliderContainer'); let x = 0; s.addEventListener('touchstart', e => x = e.changedTouches[0].screenX); s.addEventListener('touchend', e => { let d = x - e.changedTouches[0].screenX; if(Math.abs(d) > 50) manualSlide((currentIndex + (d > 0 ? 1 : -1) + heroItems.length) % heroItems.length); }); }

        init();
    </script>
</body>
</html>

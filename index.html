<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STREAMX - Premium Streaming</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root {
            --bg: #050505;
            --nav-bg: rgba(0, 0, 0, 0.9);
            --card-bg: #0d0d0f;
            --text: #ffffff;
            --text-dim: #b3b3b3;
            --accent: #E50914;
            --border: #1a1a1a;
            --shadow: rgba(229, 9, 20, 0.4);
        }

        [data-theme="light"] {
            --bg: #f5f5f7;
            --nav-bg: rgba(255, 255, 255, 0.9);
            --card-bg: #ffffff;
            --text: #1d1d1f;
            --text-dim: #6e6e73;
            --accent: #E50914;
            --border: #d2d2d7;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; transition: background 0.3s; }

        /* --- NAVBAR --- */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 6%; background: var(--nav-bg);
            position: fixed; width: 100%; top: 0; z-index: 1000;
            border-bottom: 1px solid var(--border); backdrop-filter: blur(15px);
        }
        .nav-left { display: flex; align-items: center; gap: 20px; }
        .logo { font-size: 26px; font-weight: 900; cursor: pointer; color: var(--text); text-decoration: none; }
        .logo span.red { color: var(--accent); }

        .search-box {
            background: rgba(120, 120, 120, 0.1); border: 1px solid var(--border);
            padding: 8px 18px; border-radius: 50px; display: flex; align-items: center;
            transition: 0.4s; width: 200px;
        }
        .search-box:focus-within { width: 300px; border-color: var(--accent); background: rgba(120, 120, 120, 0.15); }
        .search-box input { background: transparent; border: none; color: var(--text); outline: none; width: 100%; margin-left: 10px; }

        .theme-btn { background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; padding: 5px; }

        /* --- SIDEBAR --- */
        .sidebar {
            position: fixed; top: 0; left: -320px; width: 300px; height: 100%;
            background: var(--nav-bg); z-index: 2000; border-right: 1px solid var(--border);
            padding: 40px 30px; transition: 0.5s; backdrop-filter: blur(20px);
        }
        .sidebar.open { left: 0; }
        .sidebar-close { position: absolute; top: 25px; right: 25px; font-size: 24px; cursor: pointer; }

        /* --- BANNER --- */
        .slider-container { width: 100%; height: 80vh; position: relative; overflow: hidden; background: #000; }
        .slider-wrapper { display: flex; height: 100%; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide { min-width: 100%; height: 100%; position: relative; }
        .slide img { width: 100%; height: 100%; object-fit: cover; transition: 6s ease-in-out; }
        .slide.active img { transform: scale(1.08); }
        .slide-overlay { position: absolute; inset: 0; background: linear-gradient(to right, rgba(0,0,0,0.8) 10%, transparent 60%), linear-gradient(to top, var(--bg) 0%, transparent 30%); }
        .slide-content { position: absolute; bottom: 15%; left: 6%; z-index: 10; max-width: 450px; }
        .badge { background: var(--accent); color: white; padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 12px; display: inline-block; }
        .slide-content h1 { font-size: clamp(26px, 4vw, 42px); font-weight: 900; line-height: 1.2; margin-bottom: 10px; color: #fff; }
        .slide-content p { color: #ccc; font-size: 15px; margin-bottom: 25px; line-height: 1.5; opacity: 0.9; }
        .btn-watch-main { background: var(--accent); color: #fff; padding: 12px 30px; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 12px; font-size: 15px; transition: 0.3s; }

        /* --- CARDS & GRID --- */
        .filter-container { padding: 40px 6% 0; display: flex; gap: 12px; overflow-x: auto; scrollbar-width: none; }
        .filter-chip { padding: 10px 22px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 50px; cursor: pointer; transition: 0.3s; font-weight: 600; white-space: nowrap; color: var(--text); }
        .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

        .container { padding: 30px 6% 100px; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 25px; }
        .movie-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); transition: 0.3s; cursor: pointer; }
        .movie-card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 10px 20px var(--shadow); }
        .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .card-info { padding: 15px; }
        
        /* RESTORED CATEGORY STYLE */
        .card-genre { font-size: 10px; color: var(--accent); font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .card-info h4 { font-size: 14px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .quality-tag { background: var(--accent); color: #fff; font-size: 9px; font-weight: 900; padding: 2px 8px; border-radius: 4px; display: inline-block; margin-top: 8px; }

        /* --- PLAYER MODAL --- */
        .player-modal { position: fixed; inset: 0; background: #000; display: none; z-index: 3000; }
        #v-player { width: 100%; height: 100%; }
        .player-ui { position: absolute; inset: 0; z-index: 3100; pointer-events: none; opacity: 0; transition: 0.4s; background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.8) 100%); }
        .player-ui.show { opacity: 1; }
        .player-top-bar { position: absolute; top: 0; width: 100%; padding: 25px 40px; display: flex; justify-content: space-between; align-items: center; pointer-events: auto; }
        .player-logo { font-size: 24px; font-weight: 900; color: #fff; }
        .player-exit { font-size: 35px; color: #fff; cursor: pointer; }
        .player-settings-group { position: absolute; bottom: 100px; right: 40px; pointer-events: auto; display: flex; flex-direction: column; align-items: flex-end; }
        .settings-btn { width: 45px; height: 45px; background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); color: #fff; }
        .settings-panel { background: rgba(10, 10, 12, 0.98); border: 1px solid #333; padding: 15px; border-radius: 12px; width: 220px; margin-bottom: 10px; display: none; }
        .settings-panel.open { display: block; }
        .setting-row select { width: 100%; background: #222; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 6px; margin-bottom: 10px; }

        @media (max-width: 768px) {
            .search-box { display: none; }
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <i class="fa-solid fa-bars-staggered" style="cursor:pointer; font-size:22px" onclick="toggleSidebar()"></i>
            <a href="#" class="logo" onclick="location.reload()"><span class="red">STREAM</span><span>X</span></a>
        </div>
        <div class="nav-right" style="display:flex; gap:15px; align-items:center;">
            <div class="search-box">
                <i class="fa fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search..." oninput="searchMovies()">
            </div>
            <button class="theme-btn" onclick="toggleTheme()" id="themeBtn"><i class="fa-solid fa-moon"></i></button>
        </div>
    </nav>

    <!-- RESTORED SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <i class="fa fa-times sidebar-close" onclick="toggleSidebar()"></i>
        <div class="logo" style="margin-bottom:40px"><span class="red">STREAM</span><span>X</span></div>
        <div style="font-size:14px; color:var(--text-dim); line-height:2">
            <p style="color:var(--text); font-weight:800; font-size:16px; margin-bottom:10px">StreamX Premium</p>
            <p>Developed by Yash</p>
            <p>Contact: <a href="mailto:support@streamx.com" style="color:var(--accent); text-decoration:none;">support@streamx.com</a></p>
            <hr style="margin:20px 0; opacity:0.1">
            <p>© 2026 All Rights Reserved.</p>
        </div>
    </div>

    <section class="slider-container">
        <div class="slider-wrapper" id="sliderWrapper"></div>
    </section>

    <div class="filter-container" id="filterWrapper">
        <div class="filter-chip active" onclick="filterData('All', this)">All Content</div>
    </div>

    <div class="container" id="mainContainer">
        <div class="movie-grid" id="movieGrid" data-aos="fade-up"></div>
    </div>

    <div class="player-modal" id="playerModal">
        <div class="player-ui" id="playerUI">
            <div class="player-top-bar">
                <div class="player-logo">STREAM<span style="color:var(--accent)">X</span></div>
                <div class="player-exit" onclick="closePlayer()">&times;</div>
            </div>
            <div class="player-settings-group">
                <div class="settings-panel" id="settingsPanel">
                    <div class="setting-row"><label style="font-size:10px; color:#aaa; text-transform:uppercase;">Audio</label><select id="audioSel" onchange="changeAudio()"></select></div>
                    <div class="setting-row"><label style="font-size:10px; color:#aaa; text-transform:uppercase;">Quality</label><select id="qualitySel" onchange="changeQuality()"></select></div>
                    <div style="color:#aaa; font-size:11px; cursor:pointer;" onclick="toggleFullScreen()"><i class="fa fa-expand"></i> Fullscreen</div>
                </div>
                <div class="settings-btn" onclick="toggleSettings()"><i class="fa fa-cog"></i></div>
            </div>
        </div>
        <video id="v-player" crossorigin="anonymous" playsinline controls></video>
    </div>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800 });
        let allMovies = [], heroItems = [], gridItems = [], currentIndex = 0;
        let hls = null;
        let uiTimer;

        async function init() {
            try {
                const res = await fetch("https://api.npoint.io/56fc751c2191cd12b672");
                allMovies = await res.json();
                heroItems = allMovies.filter(m => !m.cat || m.cat.trim() === "");
                gridItems = allMovies.filter(m => m.cat && m.cat.trim() !== "");
                renderSlider();
                renderFilters();
                renderGrid(gridItems);
                startAutoSlide();
            } catch (e) { console.error("API Error"); }
        }

        function renderSlider() {
            const wrapper = document.getElementById('sliderWrapper');
            wrapper.innerHTML = heroItems.map((m, i) => `
                <div class="slide ${i===0?'active':''}">
                    <img src="${m.logo}">
                    <div class="slide-overlay"></div>
                    <div class="slide-content">
                        <span class="badge">Trending Now</span>
                        <h1>${m.name}</h1>
                        <p>Watch this exclusive blockbuster in ultra high definition. Experience cinema at home.</p>
                        <button class="btn-watch-main" onclick="openPlayer('${m.url}')">
                            <i class="fa fa-play"></i> WATCH NOW
                        </button>
                    </div>
                </div>`).join('');
        }

        function startAutoSlide() {
            setInterval(() => {
                const slides = document.querySelectorAll('.slide');
                if(!slides.length) return;
                slides[currentIndex].classList.remove('active');
                currentIndex = (currentIndex + 1) % heroItems.length;
                document.getElementById('sliderWrapper').style.transform = `translateX(-${currentIndex * 100}%)`;
                slides[currentIndex].classList.add('active');
            }, 6000);
        }

        // --- RESTORED CATEGORY IN CARDS ---
        function renderGrid(data) {
            document.getElementById('movieGrid').innerHTML = data.map(m => `
                <div class="movie-card" onclick="openPlayer('${m.url}')">
                    <img src="${m.logo}" loading="lazy">
                    <div class="card-info">
                        <span class="card-genre">${m.cat || 'General'}</span>
                        <h4>${m.name}</h4>
                        <div class="quality-tag">${m.quality || 'WEB-HQ'}</div>
                    </div>
                </div>`).join('');
        }

        function searchMovies() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            renderGrid(gridItems.filter(m => m.name.toLowerCase().includes(term)));
            if(term.length > 0) document.getElementById('filterWrapper').scrollIntoView({ behavior: 'smooth' });
        }

        function toggleTheme() {
            const html = document.documentElement;
            const nextTheme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', nextTheme);
            document.getElementById('themeBtn').innerHTML = nextTheme === 'dark' ? '<i class="fa-solid fa-moon"></i>' : '<i class="fa-solid fa-sun"></i>';
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function renderFilters() {
            const wrapper = document.getElementById('filterWrapper');
            const cats = [...new Set(gridItems.map(m => m.cat))];
            cats.forEach(c => wrapper.innerHTML += `<div class="filter-chip" onclick="filterData('${c}', this)">${c}</div>`);
        }
        function filterData(cat, el) {
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            renderGrid(cat === 'All' ? gridItems : gridItems.filter(m => m.cat === cat));
        }

        // --- PLAYER ---
        const modal = document.getElementById('playerModal');
        const video = document.getElementById('v-player');
        const ui = document.getElementById('playerUI');

        function openPlayer(url) {
            modal.style.display = 'block';
            showUI();
            if (Hls.isSupported() && url.includes('.m3u8')) {
                if(hls) hls.destroy();
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    const qSel = document.getElementById('qualitySel');
                    qSel.innerHTML = '<option value="-1">Auto</option>';
                    hls.levels.forEach((lvl, i) => { qSel.innerHTML += `<option value="${i}">${lvl.height}p</option>`; });
                    video.play();
                });
                hls.on(Hls.Events.AUDIO_TRACKS_UPDATED, () => {
                    const aSel = document.getElementById('audioSel');
                    aSel.innerHTML = hls.audioTracks.map((t, i) => `<option value="${i}">${t.name || t.lang}</option>`).join('') || '<option>Default</option>';
                });
            } else { video.src = url; video.play(); }
        }

        function changeQuality() { hls.currentLevel = parseInt(document.getElementById('qualitySel').value); }
        function changeAudio() { hls.audioTrack = parseInt(document.getElementById('audioSel').value); }
        function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('open'); }
        function showUI() { ui.classList.add('show'); clearTimeout(uiTimer); uiTimer = setTimeout(() => { if(!document.getElementById('settingsPanel').classList.contains('open')) ui.classList.remove('show'); }, 3000); }
        modal.addEventListener('mousemove', showUI);
        function toggleFullScreen() { if (!document.fullscreenElement) modal.requestFullscreen(); else document.exitFullscreen(); }
        function closePlayer() { video.pause(); if(hls) { hls.destroy(); hls = null; } if(document.fullscreenElement) document.exitFullscreen(); modal.style.display = 'none'; }

        init();
    </script>
</body>
</html>
